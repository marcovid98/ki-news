var activeCategory = 'all';

function switchVersion(v) {
  activeCategory = 'all';
  document.getElementById('searchInput').value = '';
  renderVersion(v);
}

function renderVersion(v) {
  var ver = VERSIONS[v];
  document.getElementById('headerDate').innerHTML = ver.headerDate;
  document.getElementById('footerText').innerHTML = ver.footerText;

  var html = '';
  for (var i = 0; i < ver.chips.length; i++) {
    var c = ver.chips[i];
    var act = (c.cat === activeCategory) ? ' active' : '';
    html += '<span class="chip' + act + '" data-cat="' + c.cat + '" onclick="filterCategory(\'' + c.cat + '\',this)">' + c.label + '</span>';
  }
  document.getElementById('filterChips').innerHTML = html;

  var cats = ver.categories;
  var out = '';
  for (var j = 0; j < cats.length; j++) {
    var cat = cats[j];
    var fw = (cats.length % 2 === 1 && j === cats.length - 1) ? ' full-width' : '';
    out += '<div class="category-card' + fw + '" data-cat="' + cat.cat + '">';
    out += '<div class="card-header">';
    out += '<div class="card-label">' + cat.label + '</div>';
    out += '<div class="card-title">' + cat.title + '</div>';
    out += '<div class="card-count">' + cat.news.length + ' News</div>';
    out += '</div>';
    out += '<div class="card-body">';
    for (var k = 0; k < cat.news.length; k++) {
      var n = cat.news[k];
      out += '<div class="news-item">';
      out += '<div class="news-headline">' + n.headline + '</div>';
      out += '<div class="news-field"><span class="label">Was ist passiert:</span> ' + n.was + '</div>';
      out += '<div class="news-field"><span class="label">Warum relevant f\u00fcr VWC:</span> ' + n.warum + '</div>';
      out += '<div class="news-source"><span class="label">Quelle:</span> <a href="' + n.url + '" target="_blank" rel="noopener noreferrer">' + n.quelle + '</a></div>';
      out += '</div>';
    }
    out += '</div></div>';
  }
  document.getElementById('dashboard').innerHTML = out;
}

function filterCategory(cat, el) {
  activeCategory = cat;
  var chips = document.querySelectorAll('.chip');
  for (var i = 0; i < chips.length; i++) { chips[i].className = 'chip'; }
  el.className = 'chip active';
  applyFilters();
}

function applyFilters() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.category-card');
  for (var c = 0; c < cards.length; c++) {
    var card = cards[c];
    var cat = card.getAttribute('data-cat');
    var catMatch = activeCategory === 'all' || cat === activeCategory;
    if (!catMatch) { card.style.display = 'none'; continue; }
    var items = card.querySelectorAll('.news-item');
    var anyVisible = false;
    for (var i = 0; i < items.length; i++) {
      var text = items[i].textContent.toLowerCase();
      var match = !q || text.indexOf(q) >= 0;
      items[i].style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    }
    card.style.display = anyVisible ? '' : 'none';
  }
}
