          {
            "headline": "Moonshot AI Kimi K3: Größtes Open-Weight-Modell der Welt (2,8 Bio. Parameter) rivalisiert mit GPT-5.6 Sol und Claude Fable 5",
            "was": "Am 16. Juli 2026 hat Moonshot AI (Alibaba-Beteiligung, Peking) Kimi K3 veröffentlicht – ein 2,8-Bio.-Parameter-Mixture-of-Experts-Modell (16 von 896 Experten aktiv, 1-Mio.-Token-Kontext, natives Vision-Verständnis, permanent aktives „Thinking Mode“). K3 belegt Rang #1 auf der Arena.ai Frontend Code Arena (1.679 Elo, vor Claude Fable 5) und Rang #4 im Artificial-Analysis-Intelligence-Index (57 vs. GPT-5.6 Sol 59, Fable 5 60). Preise: 3 USD Input / 15 USD Output pro Mio. Tokens – identisch zu Claude Sonnet 5. Volle Weights unter modifizierter MIT-Lizenz am 27. Juli 2026, rechtzeitig zur World AI Conference in Shanghai. Ergebnis: schlechteste Chip-Aktien-Woche seit April, Debatte um Rentabilität von 725 Mrd. USD AI-Capex.",

          {
            "headline": "Anthropic verhandelt 10-Mrd.-USD-Compute-Deal mit Meta – Meta positioniert sich als neuer Cloud-Anbieter",
            "was": "Laut New York Times (17.07.2026, bestätigt durch Reuters, CNBC, SiliconANGLE) verhandeln Anthropic und Meta über einen Compute-Leasing-Vertrag im Wert von bis zu 10 Mrd. USD über 24 Monate (~417 Mio. USD/Monat, beidseitige Ausstiegsklausel). Anthropic hatte den Deal im Juni initiiert, um seine akute Compute-Knappheit für Claude Fable/Sonnet 5 zu adressieren – parallel zum 45-Mrd.-USD-Deal mit SpaceX Colossus 1 (Mai). Für Meta wäre es der offizielle Eintritt ins Cloud-Business: Zuckerberg hatte diese Option im Mai adressiert; Ex-AWS-VP Dave Brown wechselte kürzlich zu Meta. Meta plant 2026 Capex von bis zu 145 Mrd. USD.",
            "warum": "Der KI-Compute-Markt konsolidiert sich zu einem Vier-Anbieter-Oligopol (Hyperscaler + SpaceX + Meta). Für VWCs Vendor- und Sourcing-Strategie zentral: Multi-Cloud-Setups gewinnen weiter an Bedeutung, Compute-Verfügbarkeit wird zum strategischen Risikofaktor – auch für konzerneigene Trainings- und Inference-Workloads (CARIAD, Foundation-Model-Strategie). Meta als Cloud-Player verändert das Verhandlungs- und Preisgefüge im Enterprise-KI-Markt.",
            "quelle": "Reuters / New York Times / CNBC, 17.07.2026",
            "url": "https://www.reuters.com/technology/meta-talks-10-billion-anthropic-compute-deal-nyt-reports-2026-07-17/"

            "was": "Am 17. Juli 2026 hat Apple mit ~4,88 Bio. USD Marktkapitalisierung Nvidia (~4,86 Bio. USD) überholt und wurde – kurzzeitig – wieder das wertvollste börsennotierte Unternehmen der Welt. Apple-Kurs +23 % YTD gegenüber Nvidia +7–9 %; HSBC-Upgrade auf „Buy“. Auslöser: neu vorgestelltes AI-Siri in iOS 27 (Cross-App-Actions, Semantic Search auf E-Mails/Fotos/Messages), starke iPhone-Pipeline (iPhone 18 Pro September) und Investorenrotation weg von Infrastruktur-Beneficiaries hin zu Unternehmen mit klarer AI-Monetarisierung über Services und Ecosystem-Lock-in.",
            "warum": "Marktseitige Bestätigung der McKinsey-/BCG-Kernthese: Der KI-Wert entsteht in Anwendungs- und Prozess-Layern, nicht in reiner Compute-Kapazität. Für VWC ein starkes Signal in Vorstands- und Sourcing-Diskussionen – die Konzernstrategie sollte nicht auf Modell-Rennen wetten, sondern auf Domain-Reengineering, Distribution und Datenzugang. Zusätzlich relevant: On-Device-AI-Trend (Apple Intelligence, Liquid AI bei Mercedes, Foundation Models im Fahrzeug) gewinnt strukturell an Boden.",

        ]

            "headline": "McKinsey „Rewiring customer experience for the agentic era“ – Ende der vordefinierten Customer Journey",
            "was": "Am 14. Juli 2026 hat McKinsey den Beitrag „Rewiring customer experience for the agentic era“ veröffentlicht. Kernbotschaft: Wenn KI-Agenten moment-zu-moment-Entscheidungen entlang der Customer Journey übernehmen, kollabieren klassische vordefinierte Journey-Maps. Führende Unternehmen redesignen CX von statischen Prozessen zu dynamischer, kanalübergreifender Agent-Orchestrierung – mit Echtzeit-Kontext, Multi-Agent-Kollaboration und modularen Touchpoints. Der Artikel liefert ein Referenz-Framework für CX-Redesign in der agentic era.",
            "warum": "Direkt einsetzbar für VWC-Mandate zu Kundenservice, Vertrieb und After-Sales im Konzern (VW, Audi, Porsche, VWFS). Argumentative Grundlage, um klassische Journey-Design-Projekte auf agentische Orchestrierung umzustellen – anschlussfähig an CARIADs In-Car-AI-Agent und die Agentic-AI-for-All-Roadmap in China.",

            "was": "Am 14. Juli 2026 warnt McKinsey in einem Quarterly-Artikel: KI erodiert klassische Entry-Level-Arbeit und damit den traditionellen Weg zur Fach-Expertise. Junior-Aufgaben (Recherche, Drafts, Analysen) werden automatisiert – doch genau dort haben Berufseinsteiger bisher gelernt. Organisationen müssen jetzt Wissensmanagement, Rollen-Design, Learning und Coaching als integriertes System neu aufsetzen, um weiterhin Senior-Expertise aufzubauen. Andernfalls droht ein struktureller Kompetenzverlust in 5–10 Jahren.",
            "warum": "Zentrale HR-, L&D- und Consulting-These für VWC selbst und für Konzern-Mandate. In Verbindung mit dem BCG-Befund (74 % Frontline-Adoption, aber nur 36 % Training) entsteht ein starker Beratungsansatz für People-&-Change-, Skill- und Wissensmanagement-Projekte im VW-Zukunftsplan 2030.",

            "url": "https://www.mckinsey.com/capabilities/people-and-organizational-performance/our-insights/building-expertise-in-the-age-of-ai-who-trains-the-next-generation"

            "was": "In der Juli-Serie zur „New Economics of AI“ argumentiert McKinsey (13.–14.07.2026): Per-Token-Pricing ist als Steuerungsgröße für Enterprise-KI-Kosten unbrauchbar geworden – reale Kosten setzen sich aus Reasoning-Depth, Tool-Calls, Sub-Agent-Fan-out und Retry-Loops zusammen. Führende Unternehmen steuern Agenten nach „Cost-per-completed-task“ und redesignen ihr Operating Model um Agent-Ökonomie herum. Ergänzt durch „Rewired takes: Practical people lessons for scaling AI adoption“ (13.07.) und die zweite Rewired-Edition (April 2026) als kanonisches Referenzwerk.",
            "warum": "Direktes Argumentationswerkzeug für FinOps- und Vendor-Diskussionen im Konzern. Bestätigt Ubers und Lindys „Tokenmaxxing“-Warnungen (vgl. v5) und liefert VWC eine harte betriebswirtschaftliche Klammer für alle Agenten- und Copilot-Rollouts im Konzern. Nutzbar als Basis für ein „VWC Agent Economics Framework“ in Vorstands- und Werkleiterdiskussionen.",

var activeCategory = 'all';

function switchVersion(v) {
  activeCategory = 'all';
  document.getElementById('searchInput').value = '';
  renderVersion(v);
}

function renderVersion(v) {
  var ver = VERSIONS[v];
  document.getElementById('headerDate').innerHTML = ver.headerDate;
  document.getElementById('footerText').innerHTML = ver.footerText;

  var html = '';
  for (var i = 0; i < ver.chips.length; i++) {
    var c = ver.chips[i];
    var act = (c.cat === activeCategory) ? ' active' : '';
    html += '<span class="chip' + act + '" data-cat="' + c.cat + '" onclick="filterCategory(\'' + c.cat + '\',this)">' + c.label + '</span>';
  }
  document.getElementById('filterChips').innerHTML = html;

  var cats = ver.categories;
  var out = '';
  for (var j = 0; j < cats.length; j++) {
    var cat = cats[j];
    var fw = (cats.length % 2 === 1 && j === cats.length - 1) ? ' full-width' : '';
    out += '<div class="category-card' + fw + '" data-cat="' + cat.cat + '">';
    out += '<div class="card-header">';
    out += '<div class="card-label">' + cat.label + '</div>';
    out += '<div class="card-title">' + cat.title + '</div>';
    out += '<div class="card-count">' + cat.news.length + ' News</div>';
    out += '</div>';
    out += '<div class="card-body">';
    for (var k = 0; k < cat.news.length; k++) {
      var n = cat.news[k];
      out += '<div class="news-item">';
      out += '<div class="news-headline">' + n.headline + '</div>';
      out += '<div class="news-field"><span class="label">Was ist passiert:</span> ' + n.was + '</div>';
      out += '<div class="news-field"><span class="label">Warum relevant f\u00fcr VWC:</span> ' + n.warum + '</div>';
      out += '<div class="news-source"><span class="label">Quelle:</span> <a href="' + n.url + '" target="_blank" rel="noopener noreferrer">' + n.quelle + '</a></div>';
      out += '</div>';
    }
    out += '</div></div>';
  }
  document.getElementById('dashboard').innerHTML = out;
}

function filterCategory(cat, el) {
  activeCategory = cat;
  var chips = document.querySelectorAll('.chip');
  for (var i = 0; i < chips.length; i++) { chips[i].className = 'chip'; }
  el.className = 'chip active';
  applyFilters();
}

function applyFilters() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var cards = document.querySelectorAll('.category-card');
  for (var c = 0; c < cards.length; c++) {
    var card = cards[c];
    var cat = card.getAttribute('data-cat');
    var catMatch = activeCategory === 'all' || cat === activeCategory;
    if (!catMatch) { card.style.display = 'none'; continue; }
    var items = card.querySelectorAll('.news-item');
    var anyVisible = false;
    for (var i = 0; i < items.length; i++) {
      var text = items[i].textContent.toLowerCase();
      var match = !q || text.indexOf(q) >= 0;
      items[i].style.display = match ? '' : 'none';
      if (match) anyVisible = true;
    }
    card.style.display = anyVisible ? '' : 'none';
  }
}
